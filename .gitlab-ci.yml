stages:
  - build_and_push
  - deploy

variables:
  DOCKER_IMAGE: hinn8823/devnet_dashboard:latest
  DOCKERFILE_PATH: Dockerfile
  BUILD_CONTEXT: .
  KUBE_DEPLOY_FILE: django-deploy1.yaml

before_script:
  - echo "Starting CI/CD pipeline..."
  - ls -R

build_and_push:
  stage: build_and_push
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Checking Dockerfile..."
    - if [ ! -f "$DOCKERFILE_PATH" ]; then echo "Dockerfile not found! Aborting." && exit 1; fi
    - echo "Logging in to DockerHub..."
    - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - echo "Building Docker image..."
    - export DOCKER_BUILDKIT=1
    - docker build -t $DOCKER_IMAGE -f $DOCKERFILE_PATH $BUILD_CONTEXT
    - echo "Pushing Docker image..."
    - docker push $DOCKER_IMAGE
  only:
    - main

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - echo "Deploying to Kubernetes..."
    - kubectl apply -f $KUBE_DEPLOY_FILE
  only:
    - main
