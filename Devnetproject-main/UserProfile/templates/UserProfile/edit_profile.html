{% extends 'base.html' %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="container my-5 d-flex justify-content-center">
  <div class="card shadow-lg rounded-4 p-4" style="max-width: 700px; background: linear-gradient(135deg, #f0f4f8, #d0e0e3);">
    <div class="text-center mb-4">
      <h1 class="display-4" style="color:#0066cc;">Edit Profile</h1>
      <p class="lead text-muted">Update your profile information below</p>
    </div>
    <form method="post" class="needs-validation" novalidate>
      {% csrf_token %}
      
      <!-- Role Selection -->
      <div class="mb-4">
        <label for="role" class="form-label fw-semibold" style="color:#333;">Role</label>
        <select class="form-select" id="role" name="role" required>
          <option value="user" {% if request.user.profiles.role == 'user' %}selected{% endif %}>User</option>
          <option value="support" {% if request.user.profiles.role == 'support' %}selected{% endif %}>Support</option>
          <option value="admin" {% if request.user.profiles.role == 'admin' %}selected{% endif %}>Admin</option>
        </select>
        <div class="invalid-feedback">Please select a role.</div>
      </div>
      
      <!-- Save & Back Buttons -->
      <div class="d-flex justify-content-center gap-3 mt-4">
        <button type="submit" class="btn btn-success btn-lg px-5 py-3"><i class="bi bi-check2-circle me-2"></i>Save</button>
        <a href="{% url 'view_profile' %}" class="btn btn-secondary btn-lg px-5 py-3"><i class="bi bi-arrow-left-circle me-2"></i>Back to Profile</a>
      </div>
    </form>
  </div>
</div>

<!-- Bootstrap Icons CDN -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<!-- Optional custom CSS for styling -->
<style>
  body {
    background: #f0f4f8;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  h1 {
    font-weight: 700;
  }
  /* Hover effect for buttons */
  .btn-success:hover {
    background-color: #028a0f;
    border-color: #028a0f;
  }
  .btn-secondary:hover {
    background-color: #d6d8db;
  }
</style>
{% endblock %}
