<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Account Settings</title>
<style>
/* Reset & Base Styles */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #f0f2f5;
  margin: 0;
  padding: 40px;
  color: #333;
}

/* Header */
h2 {
  text-align: center;
  color: #2c3e50;
  margin-bottom: 30px;
  font-weight: 600;
}

/* Container */
.container {
  max-width: 800px;
  margin: 0 auto;
  background-color: #ffffff;
  border-radius: 8px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  padding: 40px 30px;
}

/* Section Styles */
.section {
  margin-bottom: 40px;
}
.section h3 {
  font-size: 1.3em;
  margin-bottom: 20px;
  color: #34495e;
  border-bottom: 2px solid #ecf0f1;
  padding-bottom: 8px;
}
label {
  display: block;
  margin-bottom: 8px;
  font-weight: 600;
  font-size: 0.95em;
  color: #2c3e50;
}
input[type="text"],
input[type="email"],
input[type="password"],
select {
  width: 100%;
  padding: 12px 15px;
  margin-top: 4px;
  border: 1px solid #bdc3c7;
  border-radius: 6px;
  font-size: 1em;
  transition: border-color 0.2s;
}
input[type="text"]:focus,
input[type="email"]:focus,
input[type="password"]:focus,
select:focus {
  border-color: #2980b9;
  outline: none;
}
.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}
button {
  margin-top: 20px;
  padding: 14px 30px;
  font-size: 1em;
  font-weight: 600;
  background-color: #2980b9;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: background-color 0.2s;
}
button:hover {
  background-color: #3498db;
}

/* Additional styling for checkboxes labels */
.label-checkbox {
  display: flex;
  align-items: center;
  font-weight: 600;
  font-size: 0.95em;
}
</style>
</head>
<body>

<h2>Account Settings</h2>
<div class="container">

  <!-- Profile Section -->
  <div class="section" id="profile-section">
    <h3>Profile Information</h3>
    <form id="profileForm">
      <label for="fullName">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Your full name" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="New password" />

      <button type="submit">Save Changes</button>
    </form>
  </div>

  <!-- Preferences Section -->
  <div class="section" id="preferences-section">
    <h3>User Preferences</h3>
    <form id="preferencesForm">
      <label for="language">Language</label>
      <select id="language" name="language">
        <option value="en">English</option>
        <option value="es">Spanish</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="zh">Chinese</option>
      </select>

      <label style="margin-top:15px;">Notification Types</label>
      <div class="checkbox-group">
        <label class="label-checkbox"><input type="checkbox" name="notifications" value="email" checked /> Email Notifications</label>
        <label class="label-checkbox"><input type="checkbox" name="notifications" value="sms" /> SMS Notifications</label>
        <label class="label-checkbox"><input type="checkbox" name="notifications" value="push" /> Push Notifications</label>
      </div>

      <button type="submit">Update Preferences</button>
    </form>
  </div>

  <!-- Notification Settings Section -->
  <div class="section" id="notifications-settings-section">
    <h3>Notification Settings</h3>
    <form id="notificationsSettingsForm">
      <div class="label-checkbox" style="margin-bottom:10px;">
        <input type="checkbox" id="notifyLogin" name="notifyLogin" checked />
        <label for="notifyLogin" style="margin-left:8px;">Notify on Login</label>
      </div>
      <div class="label-checkbox" style="margin-bottom:10px;">
        <input type="checkbox" id="notifyErrors" name="notifyErrors" />
        <label for="notifyErrors" style="margin-left:8px;">Notify on Errors</label>
      </div>
      <button type="submit">Save Notification Settings</button>
    </form>
  </div>

</div>

<script>
// Example handlers (replace with your AJAX/backend logic)
document.getElementById('profileForm').addEventListener('submit', function(e) {
  e.preventDefault();
  alert('Profile updated successfully.');
});
document.getElementById('preferencesForm').addEventListener('submit', function(e) {
  e.preventDefault();
  alert('Preferences saved.');
});
document.getElementById('notificationsSettingsForm').addEventListener('submit', function(e) {
  e.preventDefault();
  alert('Notification settings saved.');
});
</script>

</body>
</html>
