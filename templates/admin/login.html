{% extends "admin/base_site.html" %}
{% load static %}

{% block content %}
<style>
  .login-box {
    max-width: 400px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 10px;
    background: #ffffff;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
</style>

<div class="login-box">
  <h2 style="text-align:center;">My Ticket System Admin</h2>

  {% if form.errors %}
    <p style="color:red;">Invalid username or password</p>
  {% endif %}

  <form method="post" action="{{ app_path }}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="default">Login</button>
  </form>
</div>
{% endblock %}
